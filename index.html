<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>HappyCapy 技能目录</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f5;--bg3:#efefef;--border:#e8e8e8;--text:#1a1a1a;--text2:#666;--text3:#999;--accent:#c8601a;--accent-bg:#fff3ed;--card:#fff;--shadow:0 1px 4px rgba(0,0,0,.07);--hover:0 4px 16px rgba(0,0,0,.11);--gold:#c8a020;--r:12px}
@media(prefers-color-scheme:dark){:root{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--border:#2a2a2a;--text:#f0f0f0;--text2:#aaa;--text3:#666;--accent:#e07830;--accent-bg:rgba(200,96,26,.15);--card:#1a1a1a;--shadow:0 1px 4px rgba(0,0,0,.3);--hover:0 4px 16px rgba(0,0,0,.5);--gold:#d4a030}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;font-size:14px;line-height:1.5}
#hd{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border)}
.ht{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;gap:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo-ic{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#c8601a,#e09030);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.logo-tx{font-size:16px;font-weight:800;letter-spacing:-.02em}
.logo-tx span{color:var(--accent)}
#badge{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text2);white-space:nowrap}
#badge b{color:var(--accent)}
.sw{padding:0 16px 10px;position:relative}
#si{width:100%;height:44px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg2);color:var(--text);font-size:15px;padding:0 40px;outline:none;transition:border-color .15s,box-shadow .15s}
#si:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,96,26,.15)}
.sic{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
#clr{position:absolute;right:28px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--text3);color:var(--bg);border:none;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center}
#clr.v{display:flex}
.tabs{display:flex;align-items:center;padding:0 16px;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px}
.tabs::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:6px 10px;border:none;background:transparent;cursor:pointer;border-radius:16px;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap}
.tb.on{background:var(--accent);color:#fff;font-weight:700}
.tb:hover:not(.on){background:var(--bg3)}
.fr{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 8px}
.tog{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none}
.tsw{width:32px;height:18px;background:var(--bg3);border-radius:9px;position:relative;transition:background .2s;flex-shrink:0}
.tsw.on{background:var(--gold)}
.tsw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.tsw.on::after{left:16px}
#rc{font-size:12px;color:var(--text3)}
#main{padding:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}}
@media(min-width:1400px){.grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);transition:all .2s}
@media(hover:hover){.card:hover{box-shadow:var(--hover);transform:translateY(-2px);border-color:var(--accent)}}
.ct{display:flex;align-items:center;gap:10px}
.ci{width:42px;height:42px;border-radius:10px;background:var(--accent-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-weight:700;overflow:hidden}
.ci img{width:26px;height:26px;object-fit:contain}
.ctw{flex:1;min-width:0}
.cn{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ce{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-family:'SF Mono',Monaco,monospace;opacity:.8}
.cd{font-size:12px;color:var(--text2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;min-height:35px}
.cf{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:4px}
.cm{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sb{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--gold);font-weight:600}
.ch{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;background:var(--bg3);color:var(--text3);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ob{display:flex;align-items:center;gap:2px;font-size:9px;color:var(--gold);font-weight:700;background:rgba(200,160,32,.15);padding:2px 5px;border-radius:4px}
.ib{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#e09030);color:#fff;border:none;cursor:pointer;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .15s;box-shadow:0 2px 6px rgba(200,96,26,.3)}
.ib:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(200,96,26,.4)}
/* 10个分类颜色 */
.cat-ai{background:#f0e8ff;color:#7b2fff}
.cat-dev{background:#e8f0ff;color:#2060d0}
.cat-ops{background:#e8fff0;color:#20803a}
.cat-create{background:#fff0e8;color:#d06020}
.cat-efficiency{background:#f0f0f0;color:#606060}
.cat-security{background:#ffe8e8;color:#d02040}
.cat-data{background:#e8f8ff;color:#0080a0}
.cat-media{background:#fff0f8;color:#c020a0}
.cat-productivity{background:#f8f0ff;color:#8040c0}
.cat-finance{background:#f0ffe8;color:#40a020}
@media(prefers-color-scheme:dark){
.cat-ai{background:rgba(123,47,255,.18);color:#b070ff}
.cat-dev{background:rgba(32,96,208,.18);color:#7090e0}
.cat-ops{background:rgba(32,128,58,.18);color:#60c080}
.cat-create{background:rgba(208,96,32,.18);color:#e09050}
.cat-efficiency{background:rgba(120,120,120,.18);color:#a0a0a0}
.cat-security{background:rgba(208,32,64,.18);color:#ff6080}
.cat-data{background:rgba(0,128,160,.18);color:#60c0e0}
.cat-media{background:rgba(192,32,160,.18);color:#e060c0}
.cat-productivity{background:rgba(128,64,192,.18);color:#c090ff}
.cat-finance{background:rgba(64,160,32,.18);color:#80e060}}
#pg{display:flex;justify-content:center;align-items:center;gap:6px;padding:20px 16px 24px;flex-wrap:wrap}
.pb{min-width:34px;height:34px;padding:0 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pb:hover{border-color:var(--accent);color:var(--accent)}
.pb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pb:disabled{opacity:.4;cursor:not-allowed}
#ld{padding:60px;text-align:center;color:var(--text3)}
.sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#em{display:none;padding:60px 20px;text-align:center;color:var(--text3)}
#em.show{display:block}
.af{background:var(--bg2);border-top:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.al{display:flex;align-items:center;gap:10px}
.aa{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#c8601a,#e09030);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.an{font-size:13px;font-weight:700}
.as{font-size:11px;color:var(--text3);margin-top:1px}
.alk{display:flex;gap:8px}
.alk a{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:11px;color:var(--text2);font-weight:600;text-decoration:none;transition:all .15s}
.alk a:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div id="hd">
  <div class="ht">
    <div class="logo">
      <div class="logo-ic">⚡</div>
      <div class="logo-tx">HappyCapy <span>技能目录</span></div>
    </div>
    <div id="badge"><b id="tn">加载中...</b> 技能</div>
  </div>

  <div class="sw">
    <span class="sic">🔍</span>
    <input id="si" type="search" placeholder="搜索技能（支持中英文、多关键词、模糊匹配）..." autocomplete="off" spellcheck="false">
    <button id="clr" onclick="clearQ()">✕</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tb on" data-cat="all" onclick="setTab(this)">全部</button>
    <button class="tb" data-cat="dev" onclick="setTab(this)">⚙ 开发编程</button>
    <button class="tb" data-cat="ai" onclick="setTab(this)">🤖 AI & ML</button>
    <button class="tb" data-cat="productivity" onclick="setTab(this)">📝 办公协作</button>
    <button class="tb" data-cat="data" onclick="setTab(this)">📊 数据分析</button>
    <button class="tb" data-cat="efficiency" onclick="setTab(this)">⚡ 效率工具</button>
    <button class="tb" data-cat="security" onclick="setTab(this)">🔒 安全防护</button>
    <button class="tb" data-cat="media" onclick="setTab(this)">🎬 媒体处理</button>
    <button class="tb" data-cat="ops" onclick="setTab(this)">☁ 运维部署</button>
    <button class="tb" data-cat="create" onclick="setTab(this)">✍ 内容创作</button>
    <button class="tb" data-cat="finance" onclick="setTab(this)">💰 财务金融</button>
  </div>

  <div class="fr">
    <label class="tog" onclick="toggleOff()">
      <div class="tsw" id="tsw"></div>
      <span>仅官方技能</span>
    </label>
    <span id="rc"></span>
  </div>
</div>

<div id="main">
  <div id="ld"><div class="sp"></div><div>正在加载技能数据...</div></div>
  <div id="em"><div style="font-size:48px;margin-bottom:16px">🔍</div><div style="font-size:16px;font-weight:600">没有找到匹配的技能</div><div style="font-size:13px;margin-top:6px;color:var(--text3)">试试其他关键词或切换分类</div></div>
  <div class="grid" id="grid"></div>
  <div id="pg"></div>
</div>

<footer class="af">
  <div class="al">
    <div class="aa">成</div>
    <div>
      <div class="an">阿成 · ACheng</div>
      <div class="as">HappyCapy 技能中文目录 · 开源免费</div>
    </div>
  </div>
  <div class="alk">
    <a href="https://github.com/AchengBusiness/happycapy-skills-zh" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
      GitHub
    </a>
    <a href="https://happycapy.ai/signup?invite_ref=aGHAUcHN" target="_blank">⚡ HappyCapy</a>
  </div>
</footer>


<script>
const CAT_CLS = {
  productivity:'cat-productivity',ai:'cat-ai',dev:'cat-dev',
  security:'cat-security',data:'cat-data',efficiency:'cat-efficiency',
  create:'cat-create',media:'cat-media',ops:'cat-ops',finance:'cat-finance'
};

let ALL = [];
let FILTERED = [];
let state = {q:'',cat:'all',off:false,page:1};
const PER_PAGE = 48;
let timer = null;

async function loadData() {
  const ld = document.getElementById('ld');
  try {
    // 第一阶段：快速加载首屏数据
    ld.innerHTML = '<div class="sp"></div><div>正在加载首屏数据...</div>';
    const r1 = await fetch('skills_initial.json?v=' + Date.now());
    if (!r1.ok) throw new Error('首屏数据加载失败: HTTP ' + r1.status);
    const initial = await r1.json();
    ALL = initial.skills || [];
    if (ALL.length === 0) throw new Error('首屏数据为空');
    document.getElementById('tn').textContent = ALL.length.toLocaleString();
    ld.style.display = 'none';
    filter();

    // 第二阶段：后台加载完整数据
    const r2 = await fetch('skills_enhanced.json?v=' + Date.now());
    if (r2.ok) {
      const data = await r2.json();
      if (data.skills && data.skills.length > 0) {
        ALL = data.skills;
        document.getElementById('tn').textContent = ALL.length.toLocaleString();
        filter();
      }
    }
  } catch (e) {
    console.error('加载错误:', e);
    ld.innerHTML = '<div style="color:#e04040;font-size:14px">加载失败: ' + e.message + '</div><div style="margin-top:8px;font-size:12px;color:var(--text3)">请刷新页面重试</div>';
  }
}

// 模糊匹配函数
function fuzzyMatch(text, keyword) {
  // 1. 精确包含
  if (text.includes(keyword)) return true;
  // 2. 模糊匹配：允许跳过1-2个字符
  if (keyword.length >= 3) {
    // 生成模糊模式：每个位置可跳过一个字符
    for (let i = 0; i < keyword.length - 1; i++) {
      const pattern = keyword.slice(0, i) + '.' + keyword.slice(i + 1);
      if (new RegExp(pattern).test(text)) return true;
    }
  }
  // 3. 首字母缩写匹配（如 vsc 匹配 visual-studio-code）
  if (keyword.length >= 2 && keyword.length <= 5) {
    const words = text.split(/[-_\s]+/);
    const initials = words.map(w => w[0] || '').join('');
    if (initials.includes(keyword)) return true;
  }
  return false;
}

function filter() {
  const q = state.q.toLowerCase().trim();
  // 支持多关键词搜索（空格分隔，AND逻辑）
  const keywords = q ? q.split(/\s+/).filter(k => k.length > 0) : [];

  FILTERED = ALL.filter(s => {
    // 分类筛选
    if (state.cat !== 'all' && s.category !== state.cat) return false;
    // 官方筛选
    if (state.off && !s.official) return false;
    // 搜索筛选
    if (keywords.length > 0) {
      const text = (s.name + ' ' + (s.zh_name || '') + ' ' + (s.author || '') + ' ' + (s.desc || '')).toLowerCase();
      // 所有关键词都必须匹配（AND逻辑，支持模糊）
      return keywords.every(kw => fuzzyMatch(text, kw));
    }
    return true;
  });
  state.page = 1;
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const em = document.getElementById('em');
  const rc = document.getElementById('rc');

  if (FILTERED.length === 0) {
    grid.innerHTML = '';
    em.classList.add('show');
    rc.textContent = '';
    document.getElementById('pg').innerHTML = '';
    return;
  }

  em.classList.remove('show');
  const start = (state.page - 1) * PER_PAGE;
  const end = start + PER_PAGE;
  const page = FILTERED.slice(start, end);

  rc.textContent = `显示 ${start+1}-${Math.min(end, FILTERED.length)} / ${FILTERED.length.toLocaleString()}`;

  grid.innerHTML = page.map(s => {
    const cat = s.category || 'efficiency';
    const catCls = CAT_CLS[cat] || 'cat-efficiency';

    // 图标
    let iconHtml;
    if (s.icon) {
      iconHtml = `<img src="${s.icon}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='${(s.zh_name||s.name).charAt(0)}'">`;
    } else {
      iconHtml = (s.zh_name || s.name).charAt(0);
    }

    // 安装链接
    const installUrl = s.install_url || s.url || '#';

    // 星标
    const stars = s.stars ? (s.stars >= 1000 ? Math.floor(s.stars/1000)+'k' : s.stars) : '';

    return `<div class="card">
      <div class="ct">
        <div class="ci ${catCls}">${iconHtml}</div>
        <div class="ctw">
          <div class="cn">${s.zh_name || s.name}</div>
          <div class="ce">${s.name}</div>
        </div>
      </div>
      <div class="cd">${s.desc || '暂无描述'}</div>
      <div class="cf">
        <div class="cm">
          ${s.official ? '<span class="ob">★ 官方</span>' : ''}
          ${stars ? `<span class="sb">⭐${stars}</span>` : ''}
          <span class="ch">${s.author || 'unknown'}</span>
        </div>
        <a class="ib" href="${installUrl}" target="_blank" rel="noopener" title="点击查看/安装 ${s.name}">+</a>
      </div>
    </div>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const pg = document.getElementById('pg');
  const total = Math.ceil(FILTERED.length / PER_PAGE);
  if (total <= 1) { pg.innerHTML = ''; return; }

  let html = '';
  html += `<button class="pb" onclick="goPage(${state.page-1})" ${state.page===1?'disabled':''}>‹</button>`;

  const range = 2;
  let start = Math.max(1, state.page - range);
  let end = Math.min(total, state.page + range);

  if (start > 1) html += `<button class="pb" onclick="goPage(1)">1</button>`;
  if (start > 2) html += `<span style="color:var(--text3);padding:0 4px">...</span>`;

  for (let i = start; i <= end; i++) {
    html += `<button class="pb${i===state.page?' on':''}" onclick="goPage(${i})">${i}</button>`;
  }

  if (end < total - 1) html += `<span style="color:var(--text3);padding:0 4px">...</span>`;
  if (end < total) html += `<button class="pb" onclick="goPage(${total})">${total}</button>`;

  html += `<button class="pb" onclick="goPage(${state.page+1})" ${state.page===total?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  state.page = p;
  render();
  document.getElementById('main').scrollIntoView({behavior:'smooth'});
}

function setTab(btn) {
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  state.cat = btn.dataset.cat;
  filter();
}

function toggleOff() {
  state.off = !state.off;
  document.getElementById('tsw').classList.toggle('on', state.off);
  filter();
}

function clearQ() {
  document.getElementById('si').value = '';
  document.getElementById('clr').classList.remove('v');
  state.q = '';
  filter();
}

document.getElementById('si').addEventListener('input', e => {
  const v = e.target.value;
  document.getElementById('clr').classList.toggle('v', v.length > 0);
  clearTimeout(timer);
  timer = setTimeout(() => {
    state.q = v;
    filter();
  }, 200);
});

document.getElementById('si').addEventListener('keydown', e => {
  if (e.key === 'Escape') clearQ();
});

// 初始化
loadData();
</script>
</body>
</html>
